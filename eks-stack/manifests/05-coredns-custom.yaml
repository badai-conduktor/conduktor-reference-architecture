apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  rewrite.override: |
    # Add rewrite rules for Conduktor Gateway SNI routing on subdomain per broker instance that redirect to the external service
    rewrite name regex .*${GATEWAY_DOMAIN_ESCAPED} conduktor-gateway-external.conduktor.svc.cluster.local answer auto

    # Add rewrite rule to allow Keycloak OIDC ingress to be resolved by the internal DNS for Console
    rewrite name regex ${OIDC_DOMAIN_ESCAPED} keycloak.cdk-deps.svc.cluster.local answer auto
