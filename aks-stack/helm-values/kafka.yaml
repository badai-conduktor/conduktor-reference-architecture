global:
  security:
    allowInsecureImages: true
clusterId: "cdk"
image:
  repository: "bitnamilegacy/kafka"
  debug: false
defaultInitContainers:
  volumePermissions:
    image:
      repository: "bitnamilegacy/os-shell"
  autoDiscovery:
    image:
      repository: "bitnamilegacy/os-shell"
metrics:
  jmx:
    image:
      repository: "bitnamilegacy/jmx-exporter"
listeners:
  client:
    port: 9092
    protocol: SASL_SSL
  external:
    protocol: SASL_SSL
sasl:
  client:
    users:
      - kafka-admin
    passwords:
      - kafka-admin-password
tls:
  autoGenerated:
    enabled: true
    engine: cert-manager
    certManager:
      existingIssuer: local-ca-issuer
      existingIssuerKind: ClusterIssuer
      keyAlgorithm: RSA
      keySize: 2048
  pemChainIncluded: true
controller:
  persistence:
    storageClass: managed-standard-ssd
    size: 10Gi
