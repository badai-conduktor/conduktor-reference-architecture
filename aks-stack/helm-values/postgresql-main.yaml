global:
  postgresql:
    auth:
      database: conduktor
      postgresPassword: conduktor
  security:
    allowInsecureImages: true
image:
  repository: "bitnamilegacy/postgresql"
volumePermissions:
  enabled: true
  image:
    repository: "bitnamilegacy/os-shell"
metrics:
  image:
    repository: "bitnamilegacy/postgres-exporter"
auth:
  postgresPassword: conduktor
primary:
  persistence:
    storageClass: managed-standard-ssd
    size: 10Gi
tls:
  enabled: true
  certificatesSecret: "pg-main-crt-secret"
  certFilename: "tls.crt"
  certKeyFilename: "tls.key"
